<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
    font-family:Arial;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

#qrcode{
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h2>Scan This QR Code</h2>

<div id="qrcode"></div>

</div>

<script>

new QRCode(document.getElementById("qrcode"), {
    text: "contact.html",
    width: 220,
    height: 220
});

</script>

</body>
</html>
